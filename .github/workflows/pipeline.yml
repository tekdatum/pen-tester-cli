name: CI - Linter, format and tests
on:
  push:
  pull_request:
    branches:
      - 'feature/**'
      - 'bugfix/**'

jobs:
  qa_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-mock pytest-cov

      - name: Ruff Check (Linting)
        run: ruff check src/

      - name: Ruff Format (Style)
        run: ruff format --check src/

      - name: MyPy (Hints)
        run: mypy ./src

      - name: Run Pytest
        run: pytest --cov=pentester --junitxml=pytest.xml --cov-report=xml:coverage.xml --cov-fail-under=90

      - name: Surface Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: pytest.xml

      - name: Add Coverage PR Comment
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          fail_below_min: true
          format: markdown
          output: both

      - name: Write to Job Summary
        run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY
